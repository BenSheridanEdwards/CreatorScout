# Scout Instagram Automation - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   docker-compose up -d         # Start all services
#   docker-compose logs -f       # View logs
#   docker-compose down          # Stop all services
#
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  # Main Scout application
  scout:
    build: .
    container_name: scout
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://scout:scout@postgres:5432/scout
      - GOLOGIN_API_TOKEN=${GOLOGIN_API_TOKEN}
      - GOLOGIN_USE_LOCAL=false
      - SMARTPROXY_USERNAME=${SMARTPROXY_USERNAME}
      - SMARTPROXY_PASSWORD=${SMARTPROXY_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - ./tmp:/app/tmp
      - ./screenshots:/app/screenshots
      - ./.sessions:/app/.sessions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scout-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: scout-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=scout
      - POSTGRES_PASSWORD=scout
      - POSTGRES_DB=scout
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout -d scout"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scout-network

  # Prisma Studio (optional - for database management)
  prisma-studio:
    build: .
    container_name: scout-prisma-studio
    restart: unless-stopped
    command: npx prisma studio
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://scout:scout@postgres:5432/scout
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scout-network
    profiles:
      - dev

volumes:
  postgres-data:

networks:
  scout-network:
    driver: bridge



