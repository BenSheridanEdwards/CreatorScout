# Scout CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# Automatically deploys to VPS on push to main branch.
# Configure secrets in GitHub repository settings:
#   - VPS_HOST: VPS IP address
#   - VPS_USER: SSH username (usually 'scout')
#   - VPS_SSH_KEY: Private SSH key for VPS access
#   - VPS_PATH: Path to Scout installation (e.g., /opt/scout)
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ secrets.VPS_PATH }}
            
            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main
            
            # Install dependencies
            npm ci --production
            
            # Generate Prisma client
            npx prisma generate
            
            # Run database migrations
            npx prisma migrate deploy
            
            # Restart application
            pm2 reload ecosystem.config.js --update-env
            
            # Save PM2 process list
            pm2 save
            
            echo "✅ Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "pm2 status"



